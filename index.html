<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pride Singles List Manager</title>
  <style>
    :root{
      --bg1:#6d28d9; --bg2:#2563eb; --bg3:#0d9488;
      --card:#ffffffcc; --text:#17172a; --muted:#62677a;
      --pending:#ffedd5; --pending2:#fb923c;
      --arrived:#dcfce7; --arrived2:#22c55e;
      --all:#dbeafe; --all2:#3b82f6;
      --wait:#f3e8ff; --wait2:#a855f7;
      --danger:#fee2e2; --danger2:#ef4444;
      --shadow:0 14px 40px rgba(15,23,42,.14);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:linear-gradient(135deg,#fff7ed 0%,#f5f3ff 38%,#ecfeff 100%);min-height:100vh}
    header{background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));color:white;padding:22px 18px 28px;box-shadow:var(--shadow)}
    .top{max-width:1120px;margin:0 auto}
    h1{margin:0;font-size:34px;letter-spacing:-.8px}.subtitle{margin-top:7px;opacity:.92;font-size:16px}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}
    .tab{border:0;border-radius:18px;padding:14px 12px;background:rgba(255,255,255,.86);box-shadow:0 6px 16px rgba(0,0,0,.12);font-size:15px;color:#172044;cursor:pointer;transition:.15s transform,.15s box-shadow;text-align:center}
    .tab strong{display:block;font-size:24px;line-height:1.1}.tab.active{transform:translateY(-2px);box-shadow:0 12px 22px rgba(0,0,0,.18)}
    .tab.pending.active{background:linear-gradient(135deg,#fff7ed,var(--pending));outline:3px solid var(--pending2)}
    .tab.arrived.active{background:linear-gradient(135deg,#f0fdf4,var(--arrived));outline:3px solid var(--arrived2)}
    .tab.all.active{background:linear-gradient(135deg,#eff6ff,var(--all));outline:3px solid var(--all2)}
    .tab.wait.active{background:linear-gradient(135deg,#faf5ff,var(--wait));outline:3px solid var(--wait2)}
    main{max-width:900px;margin:28px auto;padding:0 16px 48px}.search{width:100%;font-size:18px;padding:17px 18px;border-radius:18px;border:1px solid #d7d9e6;background:white;box-shadow:0 8px 24px rgba(15,23,42,.08);outline:none}.search:focus{border-color:#7c3aed;box-shadow:0 0 0 4px rgba(124,58,237,.15)}
    .section-title{margin:18px 0 12px;padding:18px 20px;border-radius:20px;background:var(--card);backdrop-filter:blur(10px);box-shadow:0 8px 28px rgba(15,23,42,.08);display:flex;align-items:center;justify-content:space-between}.section-title h2{margin:0;font-size:22px}.hint{color:var(--muted);font-size:14px;margin:0 0 18px}.list{display:grid;gap:12px}.person{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:14px;border-radius:20px;background:white;box-shadow:0 8px 24px rgba(15,23,42,.08);border:1px solid rgba(226,232,240,.9)}
    .person.arrived-card{background:linear-gradient(135deg,#fff,#f0fdf4);border-color:#bbf7d0}.avatar{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;color:white;font-weight:800;font-size:20px;background:linear-gradient(135deg,#7c3aed,#06b6d4)}.info .name{font-weight:800;font-size:18px}.info .phone{color:var(--muted);margin-top:4px;font-size:15px}.badge{display:inline-block;margin-top:7px;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:700}.badge.pending{background:var(--pending);color:#9a3412}.badge.arrived{background:var(--arrived);color:#166534}.badge.wait{background:var(--wait);color:#6b21a8}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}button.small{border:0;border-radius:12px;padding:10px 12px;font-weight:700;cursor:pointer}.btn-arrive{background:#16a34a;color:white}.btn-undo{background:#fef3c7;color:#92400e}.btn-copy{background:#dbeafe;color:#1d4ed8}.btn-call{background:#e0f2fe;color:#0369a1;text-decoration:none;border-radius:12px;padding:10px 12px;font-weight:700}.btn-delete{background:var(--danger);color:#b91c1c}.btn-move{background:#7c3aed;color:white}.empty{padding:28px;text-align:center;color:var(--muted);background:white;border-radius:20px;box-shadow:0 8px 24px rgba(15,23,42,.06)}
    .wait-form{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;background:white;padding:14px;border-radius:20px;box-shadow:0 8px 24px rgba(15,23,42,.08);margin-bottom:16px}.wait-form input{padding:14px;border:1px solid #d7d9e6;border-radius:14px;font-size:16px}.wait-form button{border:0;border-radius:14px;padding:0 18px;background:#7c3aed;color:white;font-weight:800}
    .notice{margin-top:18px;color:var(--muted);font-size:13px;line-height:1.4}.error{background:#fee2e2;color:#991b1b;padding:14px;border-radius:14px;margin-top:12px;display:none}
    @media(max-width:720px){h1{font-size:27px}.tabs{grid-template-columns:repeat(2,1fr)}.person{grid-template-columns:auto 1fr}.actions{grid-column:1/-1;justify-content:stretch}.actions>*{flex:1;text-align:center}.wait-form{grid-template-columns:1fr}.tab strong{font-size:21px}}
  </style>
</head>
<body>
<header><div class="top"><h1>Pride Singles List Manager</h1><div class="subtitle" id="subtitle">Loading names from Google Sheets...</div><div class="tabs"><button class="tab pending active" data-tab="pending"><strong id="pendingCount">0</strong>Pending</button><button class="tab arrived" data-tab="arrived"><strong id="arrivedCount">0</strong>Arrived</button><button class="tab all" data-tab="all"><strong id="allCount">0</strong>All</button><button class="tab wait" data-tab="waiting"><strong id="waitingCount">0</strong>Waiting list</button></div></div></header>
<main><input class="search" id="search" placeholder="Search by name" autocomplete="off"><div class="error" id="error"></div><div class="section-title"><h2 id="title">Pending</h2><span id="shownCount"></span></div><div id="waitingPanel" style="display:none"><form class="wait-form" id="waitForm"><input id="waitName" placeholder="Name"><input id="waitPhone" placeholder="Phone optional"><button>Add</button></form></div><div class="list" id="list"></div><p class="notice">Names are loaded from the published Google Sheet CSV. The page reads columns B and G, removes duplicates, sorts A to Z, and saves check-ins/waiting list only on this device/browser.</p></main>
<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSf0H5M4icbcP8pfGg7Ocf-iCV1b1SNbky2TVRroSYvdNexRpZrlOgW8X0mspB_8qCB0pk8YT5Y-JYU/pub?output=csv";
const STORAGE_KEY = "prideSinglesState_v3";
let people = [], waiting = [], tab = "pending", search = "";
const $ = id => document.getElementById(id);
function parseCSV(text){const rows=[];let row=[],cell='',q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'&&q&&n==='"'){cell+='"';i++;continue}if(c==='"'){q=!q;continue}if(c===','&&!q){row.push(cell);cell='';continue}if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n')i++;row.push(cell);if(row.some(x=>String(x).trim()!==''))rows.push(row);row=[];cell='';continue}cell+=c}row.push(cell);if(row.some(x=>String(x).trim()!==''))rows.push(row);return rows}
function cleanName(v){return String(v||'').replace(/\s+/g,' ').trim()}
function sortByName(a,b){return a.name.localeCompare(b.name,undefined,{sensitivity:'base'})}
function loadState(){try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');return {arrived:new Set(s.arrived||[]),deleted:new Set(s.deleted||[]),waiting:s.waiting||[]}}catch(e){return {arrived:new Set(),deleted:new Set(),waiting:[]}}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify({arrived:people.filter(p=>p.arrived).map(p=>p.id),deleted:people.filter(p=>p.deleted).map(p=>p.id),waiting}))}
function makeId(name){return name.toLowerCase().replace(/[^a-z0-9א-ת]+/gi,'-')}
async function load(){try{const res=await fetch(CSV_URL,{cache:'no-store'});if(!res.ok)throw new Error('Could not load CSV');const text=await res.text();const rows=parseCSV(text);const state=loadState();const seen=new Set();const list=[];rows.forEach((r,idx)=>{[r[1],r[6]].forEach(raw=>{const name=cleanName(raw);if(!name||name.length<2)return;const low=name.toLowerCase();if(low.includes('name')||low.includes('שם'))return;const id=makeId(name);if(seen.has(id))return;seen.add(id);list.push({id,name,phone:'',arrived:state.arrived.has(id),deleted:state.deleted.has(id)})})});people=list.sort(sortByName);waiting=(state.waiting||[]).sort(sortByName);$('subtitle').textContent=`Loaded ${people.filter(p=>!p.deleted).length} names from Google Sheets.`;render()}catch(e){$('subtitle').textContent='Could not load Google Sheet.';$('error').style.display='block';$('error').textContent='Failed to fetch. Check that the sheet is published to the web as CSV.';render()}}
function currentList(){let list=people.filter(p=>!p.deleted);if(tab==='pending')list=list.filter(p=>!p.arrived);if(tab==='arrived')list=list.filter(p=>p.arrived);if(tab==='waiting')list=waiting;if(search)list=list.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||(p.phone||'').includes(search));return list.sort(sortByName)}
function render(){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));$('pendingCount').textContent=people.filter(p=>!p.deleted&&!p.arrived).length;$('arrivedCount').textContent=people.filter(p=>!p.deleted&&p.arrived).length;$('allCount').textContent=people.filter(p=>!p.deleted).length;$('waitingCount').textContent=waiting.length;const titles={pending:'Pending',arrived:'Arrived',all:'All',waiting:'Waiting list'};$('title').textContent=titles[tab];$('waitingPanel').style.display=tab==='waiting'?'block':'none';const list=currentList();$('shownCount').textContent=list.length+' shown';$('list').innerHTML=list.length?'':`<div class="empty">No people to show here.</div>`;list.forEach(p=>{const div=document.createElement('div');div.className='person '+(p.arrived?'arrived-card':'');const initial=(p.name||'?').trim()[0]?.toUpperCase()||'?';if(tab==='waiting'){div.innerHTML=`<div class="avatar">${initial}</div><div class="info"><div class="name"></div><div class="phone"></div><span class="badge wait">Waiting list</span></div><div class="actions"><button class="small btn-move">Move to list</button><button class="small btn-delete">Delete</button></div>`;div.querySelector('.btn-move').onclick=()=>moveToMain(p.id);div.querySelector('.btn-delete').onclick=()=>deleteWaiting(p.id)}else{div.innerHTML=`<div class="avatar">${initial}</div><div class="info"><div class="name"></div><div class="phone"></div><span class="badge ${p.arrived?'arrived':'pending'}">${p.arrived?'Arrived':'Pending'}</span></div><div class="actions"><button class="small ${p.arrived?'btn-undo':'btn-arrive'}">${p.arrived?'Undo':'Arrived'}</button><button class="small btn-delete">Delete</button></div>`;div.querySelector('button').onclick=()=>toggleArrived(p.id);div.querySelector('.btn-delete').onclick=()=>deletePerson(p.id)}div.querySelector('.name').textContent=p.name;div.querySelector('.phone').textContent=p.phone||'';$('list').appendChild(div)})}
function toggleArrived(id){const p=people.find(x=>x.id===id);if(p)p.arrived=!p.arrived;saveState();render()}
function deletePerson(id){const p=people.find(x=>x.id===id);if(p&&confirm('Delete '+p.name+' from this device list?')){p.deleted=true;saveState();render()}}
function deleteWaiting(id){waiting=waiting.filter(p=>p.id!==id);saveState();render()}
function moveToMain(id){const p=waiting.find(x=>x.id===id);if(!p)return;waiting=waiting.filter(x=>x.id!==id);people.push({...p,arrived:false,deleted:false});people.sort(sortByName);saveState();tab='pending';render()}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;render()});$('search').oninput=e=>{search=e.target.value;render()};$('waitForm').onsubmit=e=>{e.preventDefault();const name=cleanName($('waitName').value),phone=cleanName($('waitPhone').value);if(!name)return;waiting.push({id:'wait-'+Date.now(),name,phone});waiting.sort(sortByName);$('waitName').value='';$('waitPhone').value='';saveState();render()};load();
</script>
</body>
</html>
