<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pride Singles Check-in</title>
  <style>
    :root{
      --bg:#f7f7ff; --card:#ffffff; --ink:#172033; --muted:#647084;
      --purple:#6d38ff; --blue:#1077ff; --teal:#05a99d; --pink:#ff4fa3;
      --green:#12a66a; --orange:#ff9f1c; --border:#dbe2f1;
      --shadow:0 14px 35px rgba(31,41,71,.12);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(145deg,#fff4fb 0%,#f8f6ff 38%,#eefcff 100%);color:var(--ink)}
    header{padding:18px 18px 22px;background:linear-gradient(120deg,var(--purple),var(--blue),var(--teal));color:#fff;box-shadow:var(--shadow)}
    h1{margin:0;font-size:30px;line-height:1.05}.sub{margin-top:8px;font-weight:650;opacity:.94}.tiny{font-size:13px;opacity:.86;margin-top:4px}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}.tab{border:0;border-radius:18px;background:rgba(255,255,255,.88);color:#14203d;padding:14px 8px;box-shadow:0 8px 20px rgba(0,0,0,.11);font-size:16px}.tab strong{display:block;font-size:25px}.tab.active{background:#ffe2b6;outline:3px solid rgba(255,255,255,.45)}
    main{max-width:980px;margin:26px auto;padding:0 14px 38px}.search{width:100%;font-size:18px;padding:17px 18px;border-radius:17px;border:1px solid var(--border);box-shadow:0 5px 18px rgba(31,41,71,.07);outline:none;background:#fff}.panel{margin-top:16px;background:rgba(255,255,255,.82);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}.panelTitle{display:flex;justify-content:space-between;align-items:center;padding:18px 18px;border-bottom:1px solid var(--border);font-weight:850;font-size:20px}.list{padding:12px}.person{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;background:#fff;margin:10px 0;padding:13px;border-radius:18px;border:1px solid #e7ecf7;box-shadow:0 7px 16px rgba(20,32,61,.06)}.person.arrived{background:#ecfff6;border-color:#b5efd2}.avatar{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--pink),var(--purple))}.name{font-size:18px;font-weight:850}.phone{margin-top:3px;color:var(--muted);font-weight:650}.badge{display:inline-block;margin-top:6px;font-size:12px;font-weight:800;padding:4px 8px;border-radius:999px;background:#eef2ff;color:#33406b}.actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}button{cursor:pointer}.btn{border:0;border-radius:12px;padding:10px 12px;font-weight:850;font-size:14px}.btn.arrive{background:var(--green);color:#fff}.btn.pending{background:var(--orange);color:#281a00}.btn.copy{background:#e9efff;color:#24345f}.btn.del{background:#ffe9ef;color:#9a1238}.btn.move{background:var(--purple);color:#fff}.empty{padding:28px;text-align:center;color:var(--muted);font-weight:750}.form{padding:14px;display:grid;grid-template-columns:1fr 1fr auto;gap:10px;background:#fbfcff;border-bottom:1px solid var(--border)}.form input{font-size:16px;padding:14px;border:1px solid var(--border);border-radius:14px}.note{color:var(--muted);font-size:14px;margin:14px 2px 0}.error{background:#fff2f2;color:#961b1b;border:1px solid #ffd0d0;padding:12px;border-radius:14px;margin-top:12px;font-weight:750;display:none}
    @media(max-width:720px){.tabs{grid-template-columns:repeat(2,1fr)}.person{grid-template-columns:auto 1fr}.actions{grid-column:1/-1;justify-content:stretch}.btn{flex:1}.form{grid-template-columns:1fr}.panelTitle{font-size:18px}}
  </style>
</head>
<body>
<header>
  <h1>Pride Singles List Manager</h1>
  <div class="sub" id="loadText">Loading names from Google Sheets...</div>
  <div class="tiny">Names are pulled from column B and column G. Local check-ins are saved on this browser only.</div>
  <div class="tabs">
    <button class="tab active" data-view="pending"><strong id="pendingCount">0</strong>Pending</button>
    <button class="tab" data-view="arrived"><strong id="arrivedCount">0</strong>Arrived</button>
    <button class="tab" data-view="all"><strong id="allCount">0</strong>All</button>
    <button class="tab" data-view="waiting"><strong id="waitingCount">0</strong>Waiting list</button>
  </div>
</header>
<main>
  <input id="search" class="search" placeholder="Search by name or phone" />
  <div id="error" class="error"></div>
  <section class="panel">
    <div class="panelTitle"><span id="title">Pending</span><span id="shownCount"></span></div>
    <div id="waitingForm" class="form" style="display:none">
      <input id="newName" placeholder="Full name" />
      <input id="newPhone" placeholder="Phone optional" />
      <button class="btn move" id="addWaiting">Add to waiting list</button>
    </div>
    <div class="list" id="list"></div>
  </section>
  <div class="note">Tip: if the sheet is updated, refresh this page. Deleted, arrived, and waiting-list changes stay local on this device.</div>
</main>
<script>
const SHEET_ID = '1eBbN1TLzgMzpm_ds-lJ-19iH2JgQQ3DlSTdIJLufP6Y';
const GID = '1775953041';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
const LS = 'prideSinglesState.v3';
let state = JSON.parse(localStorage.getItem(LS) || '{}');
state.arrived ||= {}; state.deleted ||= {}; state.waiting ||= [];
let people = []; let view = 'pending';
const $ = id => document.getElementById(id);
function save(){localStorage.setItem(LS, JSON.stringify(state));}
function normalize(s){return String(s||'').replace(/\uFEFF/g,'').trim();}
function parseCSV(text){
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"' && q && n==='"'){cur+='"'; i++; continue;}
    if(c==='"'){q=!q; continue;}
    if(c===',' && !q){row.push(cur); cur=''; continue;}
    if((c==='\n'||c==='\r') && !q){ if(c==='\r' && n==='\n') i++; row.push(cur); rows.push(row); row=[]; cur=''; continue;}
    cur+=c;
  }
  row.push(cur); rows.push(row); return rows;
}
function makeId(name, phone=''){return btoa(unescape(encodeURIComponent((name+'|'+phone).toLowerCase()))).replace(/=+$/,'');}
function extractPeople(rows){
  const map = new Map();
  rows.forEach((r, idx)=>{
    if(idx === 0 && /name|שם|full/i.test(r.join(' '))) return;
    // Column B = index 1, Column G = index 6. Phone may be near the name if present.
    [1,6].forEach(col=>{
      const name = normalize(r[col]);
      if(!name || name.length < 2) return;
      if(/^name$|^שם$|^full name$/i.test(name)) return;
      const phoneCandidates = [r[col+1], r[col-1], r[2], r[7], r[3], r[8]].map(normalize);
      const phone = phoneCandidates.find(x => /\d{7,}/.test(x.replace(/\D/g,''))) || '';
      const id = makeId(name, phone);
      if(!map.has(id)) map.set(id,{id,name,phone,source: col===1?'Column B':'Column G'});
    });
  });
  return [...map.values()].sort(sortByName);
}
function sortByName(a,b){return a.name.localeCompare(b.name, undefined, {sensitivity:'base'});}
function currentItems(){
  const q = $('search').value.toLowerCase().trim();
  let arr;
  if(view==='waiting') arr = state.waiting.map(x=>({...x, waiting:true}));
  else {
    arr = people.filter(p=>!state.deleted[p.id]);
    if(view==='pending') arr = arr.filter(p=>!state.arrived[p.id]);
    if(view==='arrived') arr = arr.filter(p=>state.arrived[p.id]);
  }
  if(q) arr = arr.filter(p => (p.name+' '+(p.phone||'')).toLowerCase().includes(q));
  return arr.sort(sortByName);
}
function render(){
  const main = people.filter(p=>!state.deleted[p.id]);
  const pending = main.filter(p=>!state.arrived[p.id]).length;
  const arrived = main.filter(p=>state.arrived[p.id]).length;
  $('pendingCount').textContent = pending; $('arrivedCount').textContent = arrived; $('allCount').textContent = main.length; $('waitingCount').textContent = state.waiting.length;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.dataset.view===view));
  $('waitingForm').style.display = view==='waiting' ? 'grid' : 'none';
  $('title').textContent = view==='pending'?'Pending':view==='arrived'?'Arrived':view==='all'?'All':'Waiting list';
  const items = currentItems(); $('shownCount').textContent = `${items.length} shown`;
  const list = $('list'); list.innerHTML='';
  if(!items.length){list.innerHTML='<div class="empty">No people to show</div>'; return;}
  for(const p of items){
    const div=document.createElement('div'); div.className='person '+(state.arrived[p.id]?'arrived':'');
    const initial = (p.name||'?').trim()[0] || '?';
    div.innerHTML = `<div class="avatar">${escapeHtml(initial.toUpperCase())}</div><div><div class="name">${escapeHtml(p.name)}</div><div class="phone">${escapeHtml(p.phone||'No phone')}</div><span class="badge">${p.waiting?'Waiting list':(state.arrived[p.id]?'Arrived':'Pending')} · ${escapeHtml(p.source||'Sheet')}</span></div><div class="actions"></div>`;
    const actions = div.querySelector('.actions');
    if(p.waiting){
      actions.append(btn('Move to list','move',()=>{state.waiting=state.waiting.filter(x=>x.id!==p.id); people.push({...p, waiting:false, source:'Waiting list'}); save(); render();}));
      actions.append(btn('Delete','del',()=>{state.waiting=state.waiting.filter(x=>x.id!==p.id); save(); render();}));
    } else {
      actions.append(btn(state.arrived[p.id]?'Undo':'Arrived', state.arrived[p.id]?'pending':'arrive',()=>{state.arrived[p.id]=!state.arrived[p.id]; if(!state.arrived[p.id]) delete state.arrived[p.id]; save(); render();}));
      if(p.phone) actions.append(btn('Copy','copy',()=>navigator.clipboard.writeText(p.phone)));
      if(p.phone) actions.append(btn('Call','copy',()=>{location.href='tel:'+p.phone.replace(/[^+\d]/g,'');}));
      actions.append(btn('Delete','del',()=>{if(confirm('Delete '+p.name+' from this device?')){state.deleted[p.id]=true; save(); render();}}));
    }
    list.appendChild(div);
  }
}
function btn(text, cls, fn){const b=document.createElement('button'); b.className='btn '+cls; b.textContent=text; b.onclick=fn; return b;}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
async function load(){
  try{
    const res = await fetch(CSV_URL + '&cacheBust=' + Date.now());
    if(!res.ok) throw new Error('Could not read Google Sheet. Make sure it is public or published.');
    const text = await res.text();
    const rows = parseCSV(text);
    people = extractPeople(rows).filter(p=>!state.deleted[p.id]);
    $('loadText').textContent = `Loaded ${people.length} names from Google Sheets.`;
    if(!people.length){ $('error').style.display='block'; $('error').textContent='No names found. This version reads names from column B and column G. Make sure the sheet is public/published and the names are in those columns.'; }
    render();
  }catch(e){
    $('loadText').textContent='Could not load Google Sheet.';
    $('error').style.display='block'; $('error').textContent=e.message + ' If needed, publish the sheet to the web as CSV and I can update the link.'; render();
  }
}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{view=b.dataset.view; render();});
$('search').oninput=render;
$('addWaiting').onclick=()=>{const name=normalize($('newName').value), phone=normalize($('newPhone').value); if(!name) return; state.waiting.push({id:makeId(name,phone)+'w'+Date.now(),name,phone,source:'Manual'}); state.waiting.sort(sortByName); $('newName').value=''; $('newPhone').value=''; save(); render();};
load();
</script>
</body>
</html>
